name: build

on: [push, pull_request]

jobs:
  android:
    name: Android
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Android
        run: ./gradlew assembleDebug
        working-directory: android

      - name: Extract branch name
        shell: bash
        id: extract_branch
        run: echo "branch=$(echo ${GITHUB_REF#refs/heads/} | tr '/' '_')" >> $GITHUB_OUTPUT

      - name: Rename APK
        run: mv android/app/build/outputs/apk/debug/app-debug.apk android/app/build/outputs/apk/debug/sprite-tools_debug.apk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sprite-Tools-${{ steps.extract_branch.outputs.branch }}-android
          path: android/app/build/outputs/apk/debug/sprite-tools_debug.apk

  linux:
    name: Linux
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake python3-pip libgl1-mesa-dev
          pip install aqtinstall
      
      - name: Install Qt 6.10.0
        run: python3 -m aqt install-qt linux desktop 6.10.0 linux_gcc_64 --outputdir external

      - name: Build and Install
        run: |
            cmake -B build -DCMAKE_BUILD_TYPE=Release
            cmake --build build --config Release
            cmake --install build --prefix "${{ github.workspace }}/dist" --config Release

      - name: Extract branch name
        shell: bash
        id: extract_branch
        run: echo "branch=$(echo ${GITHUB_REF#refs/heads/} | tr '/' '_')" >> $GITHUB_OUTPUT

      - name: Prepare artifact structure
        run: |
          mkdir -p release/Sprite-Tools
          cp -r dist/* release/Sprite-Tools/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sprite-Tools-${{ steps.extract_branch.outputs.branch }}-linux
          path: release

  windows:
    name: Windows
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive
      
      - name: Install aqtinstall
        run: pip install aqtinstall

      - name: Install Qt 6.10.0
        run: python -m aqt install-qt windows desktop 6.10.0 win64_msvc2022_64 --outputdir external

      - name: Build and Install
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release
          cmake --install build --prefix "${{ github.workspace }}/dist" --config Release

      - name: Extract branch name
        shell: bash
        id: extract_branch
        run: echo "branch=$(echo ${GITHUB_REF#refs/heads/} | tr '/' '_')" >> $GITHUB_OUTPUT

      - name: Prepare artifact structure
        run: |
          mkdir -p release/Sprite-Tools
          cp -r dist/* release/Sprite-Tools/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sprite-Tools-${{ steps.extract_branch.outputs.branch }}-windows
          path: release

  release:
    name: Upload release
    runs-on: ubuntu-latest
    needs: [android, linux, windows]
    if: ${{ github.event_name == 'push' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          submodules: recursive
  
      - name: Fetch artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
  
      - name: Set tag name
        run: |
          if [ "${GITHUB_REF_NAME}" = "master" ]; then
            TAG_NAME="continuous"
          else
            TAG_NAME="continuous-${GITHUB_REF_NAME}"
          fi
          RELEASE_NAME="Sprite-Tools $TAG_NAME Build"
          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_ENV
          echo "RELEASE_NAME=$RELEASE_NAME" >> $GITHUB_ENV

      - name: Pack Archives
        run: |
          mkdir final_assets
          cd artifacts
          for dir in */; do
            zip_name="${dir%/}.zip"
            echo "Creating $zip_name..."
            cd "$dir" && zip -r "../../final_assets/$zip_name" . && cd ..
          done
  
      - name: Remove old release if exists
        run: |
          if gh release list --repo ${{ github.repository }} | grep -q -e "$TAG_NAME"; then
            echo "Deleting existing release $TAG_NAME"
            gh release delete "$TAG_NAME" --yes --cleanup-tag --repo ${{ github.repository }}
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Upload new release
        run: |
          gh release create "$TAG_NAME" \
            --title "$RELEASE_NAME" \
            --prerelease final_assets/* \
            --repo ${{ github.repository }} \
            --target ${{ github.sha }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
